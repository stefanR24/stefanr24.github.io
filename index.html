    { name: "Playlist 15", songs: [

        "Sve moje njeno je Gm \n Gm Es F - Gm C F x4 Gm F x3 Es Dm - Es Gm Cm D Gm Cm Es F",

       "Reci mi da znam Hm",
       "Moje je pjesma lagana  Fism",
       "Ringispil Em",
       "Beograd Gm",
       "Jorgovani Fm",
       "Ti mozes sve Dm",
       "Da si tu Gm",
       "Ne pitaj Am",
       "Bolis me Hm",
       "Oprosti mi sto te volim Dm",
       "9000 Gm",
       "Bolje biti pijan Am",
       "Noc mi te duguje Gm"
    ] }
];
const hub = document.getElementById("hub");
const detailTitle = document.getElementById("detailTitle");
const songs = document.getElementById("songs");
playlists.forEach((playlist, index) => {
    const li = document.createElement("li");
    const button = document.createElement("button");
    button.textContent = playlist.name;
    button.onclick = function() {
        showPlaylist(index);
    };
    li.appendChild(button);
    hub.appendChild(li);
});
function showPlaylist(index) {
  const playlist = playlists[index];
  detailTitle.textContent = playlist.name;
  songs.innerHTML = "";

  // chord at end of a line (supports Am, Gm, F#, Bb, Es, As, etc.)
  const chordRegex = /\s([A-H](?:#|b|is|es|s)?m?)\s*$/i;

  playlist.songs.forEach(song => {
    const li = document.createElement("li");

    // split into [first line, second line...] (keep everything after as one block)
    const parts = song.split("\n");
    const firstLine = parts[0].trim();
    const restLines = parts.slice(1).join("\n").trim(); // progression, if any

    const match = firstLine.match(chordRegex);

    if (match) {
      const chordPart = match[1];                         // e.g. Am
      const titlePart = firstLine.replace(chordRegex, ""); // e.g. Usne boje vina

      li.innerHTML = `
        <div class="song-row">
          <span class="song-title">${titlePart}</span>
          <span class="song-chord">${chordPart}</span>
        </div>
        ${restLines ? `<div class="song-prog">${restLines}</div>` : ``}
      `;
    } else {
      // no ending chord on the first line
      li.innerHTML = `
        <div class="song-row">
          <span class="song-title">${firstLine}</span>
        </div>
        ${restLines ? `<div class="song-prog">${restLines}</div>` : ``}
      `;
    }

    songs.appendChild(li);
  });

  if (window.innerWidth < 768) {
    document.getElementById("detail").scrollIntoView({
      behavior: "smooth",
      block: "start"
    });
  }
}
</script>
</body>

    { name: "Playlist 11", songs: [

        "mjerkam te mjerkam",
    ] },
    { name: "Playlist 14", songs: [
        "bele ruze",
        "ljepsa od noci",
        "sam sam",
        "litar krvi",
        "posle tebe tugo moja"
    ] },
    { name: "Playlist 15", songs: [
        "sredinom",
        "cinim pravu stvar",
        "u ljubav vjere nemam",
        "92",

        "sve moje njeno je",

    ] },
    { name: "Other", songs: [
       "Bez tebe Esm",
       "Dugujem ti sebe Am",
       "Pesma od bola Gm",
       "Djurdjevdan Dm",
       "Ja volim Am",
       "Reci mi da znam Hm",
       "Moje je pjesma lagana  Fism",
       "Ringispil Em",
       "Beograd Gm",
       "Jorgovani Fm",
       "Ti mozes sve Dm",
       "Da si tu Gm",
       "Ne pitaj Am",
       "Bolis me Hm",
       "Oprosti mi sto te volim Dm",
       "9000 Gm",
       "Bolje biti pijan Am",
       "Noc mi te duguje Gm"
    ] }
];
const hub = document.getElementById("hub");
const detailTitle = document.getElementById("detailTitle");
const songs = document.getElementById("songs");
playlists.forEach((playlist, index) => {
    const li = document.createElement("li");
    const button = document.createElement("button");
    button.textContent = playlist.name;
    button.onclick = function() {
        showPlaylist(index);
    };
    li.appendChild(button);
    hub.appendChild(li);
});
function showPlaylist(index) {
  const playlist = playlists[index];
  detailTitle.textContent = playlist.name;
  songs.innerHTML = "";
  const chordRegex = /\s([A-H](?:#|b|is|es|s)?m?)$/i;

  playlist.songs.forEach(song => {
    const li = document.createElement("li");
    const match = song.match(chordRegex);

    if (match) {
      const chordPart = match[1];
      const titlePart = song.replace(chordRegex, "");

      li.innerHTML = `
        <span class="song-title">${titlePart}</span>
        <span class="song-chord">${chordPart}</span>
      `;
    } else {
      li.innerHTML = `<span class="song-title">${song}</span>`;
    }

    songs.appendChild(li);
  });
  if (window.innerWidth < 768) {
    document.getElementById("detail").scrollIntoView({
      behavior: "smooth",
      block: "start"
    });
  }
}
</script>
</body>
</html>
